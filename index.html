<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>
    <p>Select your choice below:</p>
    <div class="buttons">
      <button class="button rock-button">Rock</button>
      <button class="button paper-button">Paper</button>
      <button class="button scissors-button">Scissors</button>
    </div>
    <div class="scores">
      <div class="player">
        Player Score: <span class="player-score"> 0 </span>
      </div>
      <div class="computer">
        Computer Score: <span class="computer-score"> 0 </span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
